services:
  db:
    image: postgres:16-alpine
    container_name: futbolstats-db
    environment:
      POSTGRES_USER: futbol
      POSTGRES_PASSWORD: futbol123
      POSTGRES_DB: futbolstats
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futbol -d futbolstats"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: futbolstats-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://futbol:futbol123@db:5432/futbolstats
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
