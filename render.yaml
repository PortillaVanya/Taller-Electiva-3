databases:
  - name: futbolstats-db
    databaseName: futbolstats
    user: futbol
    plan: free

services:
  - type: web
    name: futbolstats-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: futbolstats-db
          property: connectionString
